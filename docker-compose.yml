services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./ui/src:/app/ui/src
      - ./ui/index.html:/app/ui/index.html
      - ./ui/vite.config.ts:/app/ui/vite.config.ts
      - ./packages/types/src:/app/packages/types/src
    command: pnpm --filter ui dev:docker

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8787:8787"
    volumes:
      - ./api/src:/app/api/src
      - ./api/wrangler.toml:/app/api/wrangler.toml
      - ./packages/types/src:/app/packages/types/src
    command: pnpm --filter api dev:docker
