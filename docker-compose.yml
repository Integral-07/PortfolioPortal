services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./ui/src:/app/ui/src
      - ./ui/index.html:/app/ui/index.html
      - ./ui/vite.config.ts:/app/ui/vite.config.ts
      - ./packages/types/src:/app/packages/types/src
    environment:
      - VITE_API_TARGET=http://host.docker.internal:8787
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    command: pnpm --filter ui dev:docker

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8787:8787"
    volumes:
      - ./api/src:/app/api/src
      - ./api/wrangler.toml:/app/api/wrangler.toml
      - ./api/.dev.vars:/app/api/.dev.vars
      - ./packages/types/src:/app/packages/types/src
      - ./db/src:/app/db/src
    depends_on:
      db:
        condition: service_healthy
    command: pnpm --filter api dev:docker

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
